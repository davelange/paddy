<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>paddy</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: grid;
        place-items: center;
        user-select: none;
        -webkit-user-select: none;
      }
      h1 {
        margin: 0;
        font-weight: 500;
      }
      #status {
        margin-top: 8px;
        text-align: center;
        opacity: 0.5;
        font-size: 13px;
        min-height: 1em;
      }
      #log {
        position: absolute;
        left: 4px;
        bottom: 4px;
        opacity: 0.5;
        font-size: 13px;
      }
      #auth {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        min-width: 260px;
        max-width: 90vw;
        text-align: center;
      }
      #auth button {
        padding: 12px;
        font-size: 16px;
        color: #eee;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        cursor: pointer;
      }
      #auth button:disabled {
        opacity: 0.5;
      }
      #auth .link {
        background: transparent;
        border: none;
        color: #8ab;
        font-size: 13px;
      }
      #auth-error {
        color: #f77;
        font-size: 13px;
        min-height: 1em;
      }
      #scrub-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        gap: 2px;
        padding: 8px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }
      #scrub-controls button {
        flex: 1;
        height: 64px;
        font-size: 32px;
        color: #eee;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      #scrub-controls button:active {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="gesture-surface" hidden>
      <h1>paddy</h1>
      <div id="status"></div>
      <div id="log"></div>
    </div>
    <section id="auth">
      <h1>paddy</h1>
      <div id="auth-login">
        <button id="auth-login-btn" type="button">unlock with passkey</button>
        <button id="auth-register-btn" class="link" type="button">register this device</button>
      </div>
      <div id="auth-pending" hidden>
        <p>waiting for approval on host Mac.</p>
        <button id="auth-retry" type="button">check again</button>
      </div>
      <div id="auth-error"></div>
    </section>
    <div id="scrub-controls" hidden>
      <button id="scrub-back" type="button" aria-label="Scrub back">‹</button>
      <button id="scrub-forward" type="button" aria-label="Scrub forward">›</button>
    </div>
    <script type="module" src="./auth.ts"></script>
    <script type="module" src="./controller.ts"></script>
  </body>
</html>
